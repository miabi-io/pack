name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The image tag tracks the pinned pack CLI version, so the release tag
      # (e.g. v0.40.7) is also the PACK_VERSION baked into the image.
      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # The pack helper image is hosted on the GitHub Container Registry (GHCR).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The buildpacks `pack` CLI helper image Miabi runs to build Dockerfile-less
      # apps. Multi-arch so it runs on amd64 and arm64 nodes.
      - name: Build and push pack
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PACK_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/miabi-io/pack:latest
            ghcr.io/miabi-io/pack:${{ env.VERSION }}
